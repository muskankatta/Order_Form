<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Fynd OF Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useCallback } = React;

const NAVY="#1B2B4B", T="#00C3B5";
const SERVICES=["Konnect","Storefront (B2C)","Storefront (B2B)","WMS (B2C)","WMS (B2B)","StoreOS","AI Photoshoot","DaaS","TMS","TMS (Logistics)","Kaily","GlamAR","Boltic","GaaS","PixelBin","AI PIM","Logistics","Engage","Partner (Extensions)","AI Studio"];
const SEGMENTS=["AI/SaaS","AI Commerce","Commerce"];
const SALES_TEAMS=["India","Global","AI/SaaS"];
const LEAD_TYPES=["Direct","Indirect"];
const LEAD_CATS={Direct:["Event","NA"],Indirect:["Pre Sales","Partner"]};
const SALE_TYPES=["New Business","Renewal","Upsell","Cross-Sell","Shift from SoW"];
const COUNTRIES=["India","UAE","USA","UK","Singapore","Australia","Malaysia","Indonesia","Saudi Arabia","South Africa","Other"];
const OF_TERMS=[{label:"1 Month",months:1},{label:"3 Months",months:3},{label:"6 Months",months:6},{label:"12 Months",months:12},{label:"24 Months",months:24},{label:"36 Months",months:36},{label:"48 Months",months:48},{label:"60 Months",months:60}];
const FEE_TYPES=["Setup Fee","Subscription Fee","Platform Fee","Licensing Fee","One-Time Fee","Transaction Fee","Logistics Fee","Usage Fee","Add-on Fee","Resource Fee"];
const FEE_RULES={"Setup Fee":{locked:"One Time"},"One-Time Fee":{locked:"One Time"},"Logistics Fee":{locked:"Monthly"},"Subscription Fee":{opts:["Monthly","Quarterly","Bi-Annually","Annually"]},"Platform Fee":{opts:["Monthly","Quarterly","Bi-Annually","Annually"]},"Transaction Fee":{opts:["Monthly","Quarterly","Bi-Annually","Annually"]},"Licensing Fee":{opts:["Monthly","Quarterly","Bi-Annually","Annually","One Time"]},"Usage Fee":{opts:["Monthly","Quarterly","Bi-Annually","Annually","One Time"]},"Add-on Fee":{opts:["Monthly","Quarterly","Bi-Annually","Annually","One Time"]},"Resource Fee":{opts:["Monthly","Quarterly","Bi-Annually","Annually","One Time"]}};
const UNIT_METRICS=["","Placed (bag)","Placed (shipment)","Placed (order)","Placed (item)","Store","User","Rider","Warehouse","Location","Item","SKU","Credit","Message (WhatsApp)","Image","Video","Tech Pack","Forward Picked","RTO Picked","Return Picked","BCA (Brand Calculated Amount)","VOG (Value of Goods)","Custom"];
const PAY_TRIGGERS=["","100% on Execution of OF","50% on Execution / 50% on Go-Live","50% Advance / 50% before Delivery","Monthly on Actuals","As per Rate Card","Custom"];
const PAY_TERMS=["Net 7","Net 15","Net 30","Net 60","Advance","Custom"];
const RENEWAL_FREQS=["Monthly","Quarterly","Bi-Annually","Annually"];
const CURRENCIES=[{code:"INR",name:"Indian Rupee",sym:"₹"},{code:"USD",name:"US Dollar",sym:"$"},{code:"AED",name:"UAE Dirham",sym:"د.إ"},{code:"GBP",name:"British Pound",sym:"£"},{code:"EUR",name:"Euro",sym:"€"},{code:"MYR",name:"Malaysian Ringgit",sym:"RM"},{code:"IDR",name:"Indonesian Rupiah",sym:"Rp"},{code:"SGD",name:"Singapore Dollar",sym:"S$"},{code:"SAR",name:"Saudi Riyal",sym:"﷼"},{code:"AUD",name:"Australian Dollar",sym:"A$"},{code:"CAD",name:"Canadian Dollar",sym:"C$"},{code:"JPY",name:"Japanese Yen",sym:"¥"},{code:"CHF",name:"Swiss Franc",sym:"Fr"},{code:"NZD",name:"New Zealand Dollar",sym:"NZ$"},{code:"ZAR",name:"South African Rand",sym:"R"},{code:"BHD",name:"Bahraini Dinar",sym:"BD"},{code:"KWD",name:"Kuwaiti Dinar",sym:"KD"},{code:"QAR",name:"Qatari Riyal",sym:"QR"},{code:"OMR",name:"Omani Rial",sym:"RO"},{code:"THB",name:"Thai Baht",sym:"฿"},{code:"PHP",name:"Philippine Peso",sym:"₱"},{code:"BDT",name:"Bangladeshi Taka",sym:"৳"},{code:"PKR",name:"Pakistani Rupee",sym:"₨"},{code:"LKR",name:"Sri Lankan Rupee",sym:"Rs"}];
const STATUS={draft:{label:"Draft",bg:"#f3f4f6",text:"#6b7280",dot:"#d1d5db"},submitted:{label:"Pending RevOps",bg:"#fffbeb",text:"#b45309",dot:"#f59e0b"},revops_approved:{label:"Pending Finance",bg:"#eff6ff",text:"#1d4ed8",dot:"#3b82f6"},revops_rejected:{label:"Rejected",bg:"#fef2f2",text:"#b91c1c",dot:"#ef4444"},approved:{label:"Approved ✓",bg:"#f0fdf4",text:"#15803d",dot:"#22c55e"},dropped:{label:"Dropped",bg:"#f9fafb",text:"#9ca3af",dot:"#d1d5db"}};
const STEPS=[{id:"client",lbl:"Client",icon:"👤"},{id:"commercial",lbl:"Commercial",icon:"📅"},{id:"fees",lbl:"Services & Fees",icon:"💰"},{id:"terms",lbl:"Special Terms",icon:"📝"},{id:"signatory",lbl:"Signatory",icon:"✍️"}];
const BLANK={customer_name:"",brand_name:"",billing_address:"",gstin:"",pan:"",country:"India",segment:"",sales_team:"",sales_rep_name:"",sales_rep_email:"",slack_id:"",sale_type:"",lead_type:"",lead_name:"",lead_category:"",client_rep_name:"",client_rep_mobile:"",client_rep_email:"",billing_email:"",po_required:"No",start_date:"",end_date:"",of_term:"",of_term_months:12,auto_renewal:"Yes",renewal_term:"Annually",committed_currency:"INR",payment_terms:"Net 7",of_value:"",arr_text:"",committed_revenue:"",services_fees:[],special_terms:"",comments:"",signatory_name:"",signatory_designation:"",signatory_email:"",customer_cc:""};

// ── HELPERS ────────────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,9).toUpperCase();
const addMonthsMinus1=(s,m)=>{if(!s||!m)return"";const d=new Date(s);d.setMonth(d.getMonth()+m);d.setDate(d.getDate()-1);return d.toISOString().split("T")[0];};
const fmtDate=s=>s?new Date(s).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}):"—";
const fmtShort=s=>s?new Date(s).toLocaleDateString("en-IN",{day:"2-digit",month:"short"}):"—";
const getQtr=d=>{if(!d)return"";const m=new Date(d).getMonth()+1;return m>=4&&m<=6?"Q1":m>=7&&m<=9?"Q2":m>=10?"Q3":"Q4";};
const getFY=d=>{if(!d)return"";const dt=new Date(d),y=dt.getFullYear(),m=dt.getMonth()+1;return m>=4?`FY${y+1}`:`FY${y}`;};
const getSym=code=>(CURRENCIES.find(c=>c.code===code)||{sym:code}).sym;
const fmtMoney=(n,code="INR")=>{if(!n&&n!==0)return"—";return getSym(code)+Number(n).toLocaleString("en-IN");};
const cyclesInTerm=(bc,months)=>{const m={"Monthly":1,"Quarterly":3,"Bi-Annually":6,"Annually":12,"One Time":0}[bc]||1;return m===0?1:Math.floor(months/m);};

// ── SLACK NOTIFICATION (direct webhook, no-cors) ───────────────────────────
// Uses mode:'no-cors' — Slack webhooks accept cross-origin POSTs from browsers.
// We don't read the response; fire-and-forget is fine for notifications.
const sendSlack=async(webhookUrl,payload)=>{
  if(!webhookUrl||!webhookUrl.startsWith("https://hooks.slack.com/"))return;
  try{
    await fetch(webhookUrl,{
      method:"POST",
      mode:"no-cors",                     // ← fixes the CORS error
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });
  }catch(e){console.warn("Slack notify failed",e);}
};

const buildSlackMsg=(event,form,extra={})=>{
  const sym=getSym(form.committed_currency||"INR");
  const svcs=(form.services_fees||[]).map(s=>s.name).filter(Boolean).join(", ")||"—";
  const rev=form.committed_revenue?`${sym}${Number(form.committed_revenue).toLocaleString("en-IN")}`:"—";
  const msgs={
    submitted:{
      text:`📋 *New Order Form submitted for RevOps review*`,
      color:"#f59e0b",
      fields:[
        {title:"Customer",value:form.customer_name||"—",short:true},
        {title:"OF Number",value:form.of_number||"PENDING",short:true},
        {title:"Sales Rep",value:`${form.sales_rep_name||"—"} (${form.sales_rep_email||"—"})`,short:false},
        {title:"Services",value:svcs,short:false},
        {title:"Committed Revenue",value:rev,short:true},
        {title:"Period",value:`${fmtDate(form.start_date)} → ${fmtDate(form.end_date)}`,short:true},
      ]
    },
    revops_approved:{
      text:`✅ *Order Form approved by RevOps — pending Finance*`,
      color:"#3b82f6",
      fields:[
        {title:"Customer",value:form.customer_name||"—",short:true},
        {title:"Sales Rep",value:form.sales_rep_name||"—",short:true},
        {title:"Services",value:svcs,short:false},
        {title:"Committed Revenue",value:rev,short:true},
        {title:"RevOps Comment",value:extra.comment||"—",short:false},
      ]
    },
    finance_approved:{
      text:`🎉 *Order Form fully approved by Finance!*`,
      color:"#22c55e",
      fields:[
        {title:"OF Number",value:extra.ofNumber||form.of_number||"—",short:true},
        {title:"Customer",value:form.customer_name||"—",short:true},
        {title:"Sales Rep",value:form.sales_rep_name||"—",short:true},
        {title:"Services",value:svcs,short:false},
        {title:"Committed Revenue",value:rev,short:true},
        {title:"Finance Comment",value:extra.comment||"—",short:false},
      ]
    },
  };
  const m=msgs[event];if(!m)return null;
  return{
    attachments:[{
      color:m.color,
      text:m.text,
      fields:m.fields,
      footer:"Fynd OF Platform",
      ts:Math.floor(Date.now()/1000)
    }]
  };
};

const calcMetrics=(services,termMonths)=>{
  const lines=[];let total=0;
  (services||[]).forEach(svc=>{
    (svc.fees||[]).forEach(fee=>{
      if(fee.isLogistics){lines.push(`Logistics Fee (${svc.name}) = As per Rate Card`);return;}
      if(fee.pricingModel==="graduated"){lines.push(`${fee.feeType} (${svc.name}) = Variable`);return;}
      if(fee.stepUpPricing&&fee.stepUpValues?.length){
        let t=0,parts=[];fee.stepUpValues.forEach(sv=>{const v=parseFloat(sv.value)||0;parts.push(`${sv.label||"Period"} = ${v.toLocaleString("en-IN")}`);t+=v;});
        lines.push(`${fee.feeType} (${svc.name}) — ${parts.join("; ")}`);total+=t;return;
      }
      const val=parseFloat(fee.commercialValue)||0;if(!val)return;
      if(fee.billingCycle==="One Time"){lines.push(`${fee.feeType} (${svc.name}) = ${val.toLocaleString("en-IN")}`);total+=val;}
      else{const c=cyclesInTerm(fee.billingCycle,termMonths);lines.push(`${fee.feeType} (${svc.name}) = ${val.toLocaleString("en-IN")} × ${c} = ${(val*c).toLocaleString("en-IN")}`);total+=val*c;}
    });
  });
  return{arrText:lines.join("\n"),committed:total};
};

const calcOFValue=(services,termMonths)=>
  (services||[]).reduce((sum,svc)=>sum+(svc.fees||[]).reduce((s2,fee)=>{
    if(fee.isLogistics||fee.pricingModel==="graduated")return s2;
    const val=parseFloat(fee.commercialValue)||0;if(!val)return s2;
    if(fee.billingCycle==="One Time")return s2+val;
    if(fee.stepUpPricing&&fee.stepUpValues?.length)return s2+fee.stepUpValues.reduce((a,sv)=>a+(parseFloat(sv.value)||0),0);
    return s2+val*cyclesInTerm(fee.billingCycle,termMonths);
  },0),0);

// ── ATOMS ──────────────────────────────────────────────────────────────────
const fc="w-full text-sm px-3 py-2 rounded-lg border focus:outline-none transition-all bg-white disabled:bg-slate-50 disabled:text-slate-400 disabled:cursor-default";
const fs={borderColor:"#e2e8f0"};
const ff=e=>{e.target.style.borderColor=T;e.target.style.boxShadow=`0 0 0 3px ${T}22`;};
const fb=e=>{e.target.style.borderColor="#e2e8f0";e.target.style.boxShadow="none";};

const Lbl=({c,req})=><label className="block text-[11px] font-bold uppercase tracking-widest mb-1.5" style={{color:"#94a3b8"}}>{c}{req&&<span style={{color:"#f87171"}} className="ml-0.5">*</span>}</label>;
const Inp=({label,req,type="text",value,onChange,placeholder,disabled,mono,hint})=>(
  <div className="mb-4"><Lbl c={label} req={req}/>
  <input type={type} value={value||""} onChange={e=>onChange&&onChange(e.target.value)} placeholder={placeholder} disabled={disabled}
    className={fc+(mono?" font-mono":"")} style={fs} onFocus={e=>!disabled&&ff(e)} onBlur={fb}/>
  {hint&&<p className="text-xs mt-1" style={{color:"#94a3b8"}}>{hint}</p>}</div>
);
const Sel=({label,req,value,onChange,options,disabled,hint})=>(
  <div className="mb-4"><Lbl c={label} req={req}/>
  <select value={value||""} onChange={e=>onChange&&onChange(e.target.value)} disabled={disabled} className={fc+" cursor-pointer"} style={fs}>
    <option value="">Select…</option>
    {options.map(o=>{const v=typeof o==="object"?o.value:o,l=typeof o==="object"?o.label:o;return<option key={v} value={v}>{l}</option>;})}
  </select>
  {hint&&<p className="text-xs mt-1" style={{color:"#94a3b8"}}>{hint}</p>}</div>
);
const TA=({label,req,value,onChange,disabled,rows=3,hint,mono})=>(
  <div className="mb-4"><Lbl c={label} req={req}/>
  <textarea rows={rows} value={value||""} onChange={e=>onChange&&onChange(e.target.value)} disabled={disabled}
    className={fc+" resize-none"+(mono?" font-mono text-xs":"")} style={fs}/>
  {hint&&<p className="text-xs mt-1" style={{color:"#94a3b8"}}>{hint}</p>}</div>
);
const Btn=({children,onClick,variant="primary",disabled,size="md"})=>{
  const s={primary:{background:T,color:"#fff"},navy:{background:NAVY,color:"#fff"},ghost:{background:"#fff",color:"#475569",border:"1px solid #e2e8f0"},danger:{background:"#ef4444",color:"#fff"},success:{background:"#22c55e",color:"#fff"}}[variant];
  const ps={sm:"px-3 py-1.5 text-xs",md:"px-4 py-2 text-sm",lg:"px-5 py-2.5 text-sm"}[size];
  return<button onClick={onClick} disabled={disabled} style={s} className={`${ps} rounded-lg font-semibold transition-all hover:opacity-90 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-1.5`}>{children}</button>;
};
const Card=({children,className=""})=><div className={`bg-white rounded-2xl border ${className}`} style={{borderColor:"#e8edf3",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>{children}</div>;
const Toast=({msg,type,onClose})=><div style={{background:type==="error"?"#ef4444":"#22c55e"}} className="fixed bottom-5 right-5 z-50 flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl text-white text-sm font-medium"><span>{type==="error"?"✕":"✓"}</span>{msg}<button onClick={onClose} className="ml-1 opacity-60">×</button></div>;
const SHdr=({c})=><div className="text-xs font-bold uppercase tracking-wider mb-4 mt-2 pb-2" style={{color:"#94a3b8",borderBottom:"1px solid #f1f5f9"}}>{c}</div>;
const StatusPill=({status})=>{const s=STATUS[status]||STATUS.draft;return<span style={{background:s.bg,color:s.text}} className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold"><span style={{background:s.dot}} className="w-1.5 h-1.5 rounded-full inline-block"/>{s.label}</span>;};

// ── CURRENCY SELECTOR ──────────────────────────────────────────────────────
const CurrSel=({value,onChange,disabled})=>{
  const [all,setAll]=useState(false);
  const common=CURRENCIES.slice(0,10);
  const list=all?CURRENCIES:common;
  return<div className="mb-4"><Lbl c="Billing currency" req/>
    <select value={value||"INR"} onChange={e=>!disabled&&onChange(e.target.value)} disabled={disabled} className={fc+" cursor-pointer"} style={fs}>
      {list.map(c=><option key={c.code} value={c.code}>{c.code} — {c.name} ({c.sym})</option>)}
    </select>
    {!disabled&&<button type="button" onClick={()=>setAll(a=>!a)} className="text-xs mt-1 font-medium" style={{color:T}}>{all?"▲ Show fewer":"▼ Show all global currencies"}</button>}
  </div>;
};

// ── FEE ROW ────────────────────────────────────────────────────────────────
const newFee=()=>({id:uid(),feeType:"",billingCycle:"",billingCycleLocked:false,pricingModel:"flat",commercialValue:"",isLogistics:false,logisticsRateCard:"https://drive.google.com/file/d/1MiLGcxC0xZxbWsCO2GyhSQ-VecI8uO8g/view?usp=sharing",inclusions:"",unitMetric:"",paymentTrigger:"",usageCycleDiffers:false,usageCycle:"",stepUpPricing:false,stepUpValues:[],slabs:[{id:uid(),from:"0",to:"",rate:"",rateType:"₹ per unit"}]});

const FeeRow=({fee,onChange,onRemove,idx,termMonths})=>{
  const u=(k,v)=>onChange({...fee,[k]:v});
  const rules=FEE_RULES[fee.feeType]||{};
  const cycleOpts=rules.locked?[]:(rules.opts||["Monthly","Quarterly","Bi-Annually","Annually","One Time"]);
  const handleFeeType=ft=>{const r=FEE_RULES[ft]||{};const bc=r.locked||(r.opts?.[0])||"";onChange({...fee,feeType:ft,billingCycle:bc,billingCycleLocked:!!r.locked,isLogistics:ft==="Logistics Fee",pricingModel:"flat"});};
  const updSlab=(si,field,val)=>{const slabs=fee.slabs.map((s,i)=>i===si?{...s,[field]:val}:s);if(field==="to"&&fee.slabs[si+1]){slabs[si+1]={...slabs[si+1],from:String(parseInt(val||0)+1)};}u("slabs",slabs);};
  const addSlab=()=>{const last=fee.slabs[fee.slabs.length-1];const from=last.to?String(parseInt(last.to)+1):"";u("slabs",[...fee.slabs,{id:uid(),from,to:"",rate:"",rateType:"₹ per unit"}]);};
  const addStep=()=>u("stepUpValues",[...(fee.stepUpValues||[]),{id:uid(),label:"",value:""}]);
  const updStep=(i,field,val)=>u("stepUpValues",(fee.stepUpValues||[]).map((s,j)=>j===i?{...s,[field]:val}:s));
  const canGrad=["Transaction Fee","Licensing Fee","Usage Fee","Add-on Fee"].includes(fee.feeType);
  const canStep=["Subscription Fee","Platform Fee","Licensing Fee"].includes(fee.feeType)&&fee.billingCycle!=="One Time";
  const isOT=fee.billingCycle==="One Time";
  const cycles=termMonths&&fee.billingCycle&&!isOT?cyclesInTerm(fee.billingCycle,termMonths):null;
  return(
    <div className="border rounded-xl p-4 mb-3" style={{borderColor:"#e2e8f0",background:"#fafafa"}}>
      <div className="flex justify-between mb-3"><span className="text-xs font-bold uppercase tracking-wider" style={{color:"#94a3b8"}}>Fee row {idx+1}</span><button type="button" onClick={onRemove} className="text-xs font-medium" style={{color:"#ef4444"}}>✕ Remove</button></div>
      <div className="grid grid-cols-3 gap-3 mb-3">
        <div><div className="text-[10px] font-bold uppercase tracking-wider mb-1" style={{color:"#94a3b8"}}>Fee type *</div>
          <select value={fee.feeType} onChange={e=>handleFeeType(e.target.value)} className="w-full text-xs px-2 py-1.5 rounded-lg border focus:outline-none bg-white" style={{borderColor:"#e2e8f0"}}>
            <option value="">Select…</option>{FEE_TYPES.map(f=><option key={f}>{f}</option>)}
          </select></div>
        <div><div className="text-[10px] font-bold uppercase tracking-wider mb-1" style={{color:"#94a3b8"}}>Billing cycle{fee.billingCycleLocked&&<span style={{color:"#22c55e",textTransform:"none",letterSpacing:0}}> (auto)</span>}</div>
          {fee.billingCycleLocked
            ?<input value={fee.billingCycle} readOnly className="w-full text-xs px-2 py-1.5 rounded-lg border" style={{borderColor:"#e2e8f0",background:"#f8fafc",color:"#64748b"}}/>
            :<select value={fee.billingCycle} onChange={e=>u("billingCycle",e.target.value)} className="w-full text-xs px-2 py-1.5 rounded-lg border focus:outline-none bg-white" style={{borderColor:"#e2e8f0"}}>
              <option value="">Select…</option>{cycleOpts.map(o=><option key={o}>{o}</option>)}
            </select>}</div>
        {canGrad&&<div><div className="text-[10px] font-bold uppercase tracking-wider mb-1" style={{color:"#94a3b8"}}>Pricing model</div>
          <div className="flex gap-1">{["flat","graduated"].map(pm=><button key={pm} type="button" onClick={()=>u("pricingModel",pm)} className="flex-1 text-xs py-1.5 rounded-lg font-semibold border transition-all" style={fee.pricingModel===pm?{background:NAVY,color:"#fff",borderColor:NAVY}:{background:"#f8fafc",color:"#64748b",borderColor:"#e2e8f0"}}>{pm==="flat"?"Flat":"Graduated"}</button>)}</div></div>}
      </div>
      {fee.isLogistics&&(
        <div className="mb-3"><div className="text-[10px] font-bold uppercase tracking-wider mb-1" style={{color:"#94a3b8"}}>Rate card URL</div>
          <input value={fee.logisticsRateCard||""} onChange={e=>u("logisticsRateCard",e.target.value)} className="w-full text-xs px-2 py-1.5 rounded-lg border focus:outline-none" style={{borderColor:"#e2e8f0"}}/>
          <p className="text-[10px] mt-1" style={{color:"#94a3b8"}}>Renders as "As per rate card" in PDF with hyperlink</p></div>
      )}
      {!fee.isLogistics&&fee.pricingModel==="graduated"&&(
        <div className="mb-3 rounded-lg p-3" style={{background:"#f0f4f8",border:"1px solid #e2e8f0"}}>
          <div className="text-[10px] font-bold uppercase tracking-wider mb-2" style={{color:"#64748b"}}>Slab tiers</div>
          <div className="grid gap-1 mb-1" style={{gridTemplateColumns:"1fr 1fr 1fr 1.2fr 20px"}}>
            {["From","To","Rate","Rate type",""].map((h,i)=><div key={i} className="text-[9px] font-bold uppercase tracking-wider" style={{color:"#94a3b8"}}>{h}</div>)}
          </div>
          {fee.slabs.map((sl,si)=>(
            <div key={sl.id} className="grid gap-1 mb-1.5 items-center" style={{gridTemplateColumns:"1fr 1fr 1fr 1.2fr 20px"}}>
              <input value={sl.from} readOnly={si>0} onChange={e=>updSlab(si,"from",e.target.value)} className="text-xs px-2 py-1 rounded border font-mono" style={{borderColor:"#e2e8f0",background:si>0?"#f8fafc":"#fff"}}/>
              <input value={sl.to} onChange={e=>updSlab(si,"to",e.target.value)} placeholder="∞" className="text-xs px-2 py-1 rounded border font-mono" style={{borderColor:"#e2e8f0"}}/>
              <input value={sl.rate} onChange={e=>updSlab(si,"rate",e.target.value)} placeholder="0.00" className="text-xs px-2 py-1 rounded border font-mono" style={{borderColor:"#e2e8f0"}}/>

const SvcBlock=({svc,idx,onChange,onRemove,termMonths,ro})=>{
  const letter=String.fromCharCode(97+idx);
  const addFee=()=>onChange({...svc,fees:[...(svc.fees||[]),newFee()]});
  const updFee=(fi,u)=>onChange({...svc,fees:svc.fees.map((f,i)=>i===fi?u:f)});
  const remFee=fi=>onChange({...svc,fees:svc.fees.filter((_,i)=>i!==fi)});
  return(
    <div className="border rounded-2xl mb-4 overflow-hidden" style={{borderColor:"#e2e8f0"}}>
      <div className="flex items-center justify-between px-5 py-3" style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>

      </div>
      <div className="p-5">
        {(svc.fees||[]).map((fee,fi)=>(
          ro?<div key={fee.id} className="border rounded-xl p-3 mb-2 text-xs" style={{borderColor:"#e2e8f0",background:"#fafafa"}}>
            <span className="font-semibold" style={{color:NAVY}}>{fee.feeType}</span> · {fee.billingCycle} · {fee.isLogistics?"As per rate card":fee.pricingModel==="graduated"?"Variable":fee.commercialValue||"—"}
            {fee.inclusions&&<span style={{color:"#64748b"}}> · Inclusions: {fee.inclusions}</span>}

// ── SETTINGS PAGE ──────────────────────────────────────────────────────────
const SettingsPage=({settings,onSave})=>{
  const [url,setUrl]=useState(settings.slackWebhook||"");
  const [testStatus,setTestStatus]=useState(null); // null | "sending" | "sent" | "error"

  const handleSave=()=>{
    if(url&&!url.startsWith("https://hooks.slack.com/")){
      setTestStatus("error");return;
    }
    onSave({...settings,slackWebhook:url});
    setTestStatus("saved");
    setTimeout(()=>setTestStatus(null),2500);
  };

  const handleTest=async()=>{
    if(!url){setTestStatus("error");return;}
    setTestStatus("sending");
    await sendSlack(url,{
      attachments:[{
        color:"#00C3B5",
        text:"🧪 *Test notification from Fynd OF Platform*",
        fields:[{title:"Status",value:"Slack webhook is working correctly ✓",short:false}],
        footer:"Fynd OF Platform · Settings test",
        ts:Math.floor(Date.now()/1000)
      }]
    });
    // With no-cors we can't read success/failure, so we assume delivery after 1s
    setTimeout(()=>setTestStatus("sent"),1000);
    setTimeout(()=>setTestStatus(null),4000);
  };

  return<div>
    <div className="mb-6">
      <h2 className="text-xl font-bold" style={{color:NAVY}}>Platform Settings</h2>
      <p className="text-sm mt-0.5" style={{color:"#94a3b8"}}>Configure integrations and platform behaviour.</p>
    </div>

    <Card className="p-6 mb-5">
      <div className="flex items-center gap-3 mb-1">
        <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl" style={{background:"#4A154B"}}>💬</div>
        <div>
          <div className="font-bold" style={{color:NAVY}}>Slack Notifications</div>
          <div className="text-xs mt-0.5" style={{color:"#94a3b8"}}>Direct webhook — no third-party proxy, works from any browser</div>
        </div>
      </div>

      <div className="mt-4 mb-3 p-3 rounded-xl text-xs" style={{background:"#f0fdf4",border:"1px solid #bbf7d0",color:"#166534"}}>
        ✓ Uses <strong>direct Slack Incoming Webhooks</strong> with <code style={{background:"#dcfce7",padding:"1px 4px",borderRadius:4}}>mode: no-cors</code> — this bypasses browser CORS restrictions that block third-party proxies like Boltic.
      </div>

      <Inp
        label="Slack Incoming Webhook URL"
        value={url}
        onChange={setUrl}
        placeholder="https://hooks.slack.com/services/T.../B.../..."
        hint="Create one at api.slack.com/apps → your app → Incoming Webhooks → Add New Webhook to Workspace"
        mono
      />

      <div className="flex gap-3 items-center mt-1">
        <Btn onClick={handleSave}>💾 Save webhook</Btn>
        <Btn variant="ghost" onClick={handleTest} disabled={!url||testStatus==="sending"}>
          {testStatus==="sending"?"Sending…":"🚀 Test trigger"}
        </Btn>

const Repository=({forms,onSelect})=>{
  const [q,setQ]=useState("");
  const [st,setSt]=useState("all");
  const [repoTab,setRepoTab]=useState("of");
  const filtered=forms.filter(f=>{
    const m=!q||[f.customer_name,f.of_number,f.sales_rep_name,f.brand_name].some(v=>v?.toLowerCase().includes(q.toLowerCase()));
    return m&&(st==="all"||f.status===st);
  });
  const svcRows=[];filtered.forEach(f=>(f.services_fees||[]).forEach(svc=>svcRows.push({f,svc})));
  const exportCSV=()=>{
    let hdr,rows;
    if(repoTab==="of"){
      hdr=["#","OF No","QTR","FY","Customer","Brand","Services","Segment","Team","Rep","Lead Type","Start","End","ARR","Committed Revenue","Currency","Status"];
      rows=filtered.map((f,i)=>[i+1,f.of_number||"",getQtr(f.start_date),getFY(f.start_date),f.customer_name,f.brand_name,(f.services_fees||[]).map(s=>s.name).join("; "),f.segment,f.sales_team,f.sales_rep_name,f.lead_type,f.start_date,f.end_date,(f.arr_text||"").replace(/\n/g," | "),f.committed_revenue,f.committed_currency||"INR",STATUS[f.status]?.label]);

      hdr=["#","OF No","Customer","Brand","Service","Fee Summary","Start","End","Status"];
      rows=svcRows.map(({f,svc},i)=>[i+1,f.of_number||"",f.customer_name,f.brand_name,svc.name,(svc.fees||[]).map(fee=>`${fee.feeType}: ${fee.commercialValue||"—"}`).join("; "),f.start_date,f.end_date,STATUS[f.status]?.label]);
    }
    const csv=[hdr,...rows].map(r=>r.map(c=>`"${(c||"").toString().replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download=`${repoTab==="of"?"OF_Index":"Service_Index"}_${new Date().toISOString().split("T")[0]}.csv`;a.click();
  };
  return<div>
    <div className="flex items-center justify-between mb-6">
      <div>
        <h2 className="text-xl font-bold" style={{color:NAVY}}>Repository</h2>
        <p className="text-sm mt-0.5" style={{color:"#94a3b8"}}>{filtered.filter(f=>f.status==="approved").length} approved · {filtered.length} OFs</p>
      </div>
      <Btn variant="ghost" onClick={exportCSV}>⬇ Export CSV</Btn>
    </div>
    <div className="flex gap-2 mb-4">
      {[{id:"of",lbl:"📁 Index (per OF)"},{id:"service",lbl:"📋 Service index"}].map(t=>(
        <button key={t.id} onClick={()=>setRepoTab(t.id)} className="px-4 py-2 text-sm font-semibold rounded-xl border transition-all" style={repoTab===t.id?{background:NAVY,color:"#fff",borderColor:NAVY}:{background:"#f8fafc",color:"#64748b",borderColor:"#e2e8f0"}}>{t.lbl}</button>
      ))}
    </div>
    <div className="flex gap-3 mb-4">
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Search customer, OF#, rep…" className="flex-1 text-sm border rounded-xl px-4 py-2.5 focus:outline-none" style={{borderColor:"#e2e8f0"}}/>
      <select value={st} onChange={e=>setSt(e.target.value)} className="text-sm border rounded-xl px-3 py-2.5 bg-white" style={{borderColor:"#e2e8f0"}}>
        <option value="all">All status</option>{Object.entries(STATUS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
      </select>
    </div>
    {repoTab==="of"?(
      <Card className="overflow-hidden">
        <table className="w-full text-sm">
          <thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e8edf3"}}>
            {["#","OF Number","Customer","Services","Committed","Period","Rep","Status"].map(h=><th key={h} className="text-left px-4 py-3 text-[11px] font-bold uppercase tracking-wider" style={{color:"#94a3b8"}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {filtered.length===0&&<tr><td colSpan={8} className="text-center py-16" style={{color:"#d1d5db"}}>No order forms found.</td></tr>}
            {filtered.map((f,i)=>(
              <tr key={f.id} onClick={()=>onSelect(f)} className="cursor-pointer hover:bg-slate-50" style={{borderBottom:"1px solid #f1f5f9"}}>
                <td className="px-4 py-3.5 text-xs" style={{color:"#d1d5db"}}>{i+1}</td>
                <td className="px-4 py-3.5 font-mono font-bold text-sm" style={{color:f.of_number?NAVY:"#cbd5e1"}}>{f.of_number||"—"}</td>
                <td className="px-4 py-3.5"><div className="font-semibold text-sm" style={{color:NAVY}}>{f.customer_name}</div><div className="text-xs" style={{color:"#94a3b8"}}>{f.brand_name}</div></td>
                <td className="px-4 py-3.5"><div className="flex flex-wrap gap-1">{(f.services_fees||[]).slice(0,2).map(s=><span key={s.id} className="text-xs px-2 py-0.5 rounded-full" style={{background:"#e0f7f5",color:"#00897b"}}>{s.name}</span>)}{(f.services_fees||[]).length>2&&<span className="text-xs" style={{color:"#94a3b8"}}>+{f.services_fees.length-2}</span>}</div></td>
                <td className="px-4 py-3.5 text-xs font-semibold" style={{color:NAVY}}>{fmtMoney(f.committed_revenue,f.committed_currency)}</td>
                <td className="px-4 py-3.5 text-xs" style={{color:"#64748b"}}>{fmtShort(f.start_date)} → {fmtShort(f.end_date)}</td>
                <td className="px-4 py-3.5 text-xs" style={{color:"#64748b"}}>{f.sales_rep_name}</td>
                <td className="px-4 py-3.5"><StatusPill status={f.status}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
    ):(
      <Card className="overflow-hidden">
        <table className="w-full text-sm">
          <thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e8edf3"}}>
            {["#","OF Number","Customer","Service","Fee summary","Period","Rep","Status"].map(h=><th key={h} className="text-left px-4 py-3 text-[11px] font-bold uppercase tracking-wider" style={{color:"#94a3b8"}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {svcRows.length===0&&<tr><td colSpan={8} className="text-center py-16" style={{color:"#d1d5db"}}>No rows.</td></tr>}
            {svcRows.map(({f,svc},i)=>(
              <tr key={`${f.id}-${svc.id}`} onClick={()=>onSelect(f)} className="cursor-pointer hover:bg-slate-50" style={{borderBottom:"1px solid #f1f5f9"}}>
                <td className="px-4 py-3.5 text-xs" style={{color:"#d1d5db"}}>{i+1}</td>
                <td className="px-4 py-3.5 font-mono font-bold text-sm" style={{color:f.of_number?NAVY:"#cbd5e1"}}>{f.of_number||"—"}</td>
                <td className="px-4 py-3.5"><div className="font-semibold text-xs" style={{color:NAVY}}>{f.customer_name}</div><div className="text-xs" style={{color:"#94a3b8"}}>{f.brand_name}</div></td>
                <td className="px-4 py-3.5"><span className="text-xs px-2 py-0.5 rounded-full font-semibold" style={{background:"#e0f7f5",color:"#00897b"}}>{svc.name||"—"}</span></td>
                <td className="px-4 py-3.5 text-xs" style={{color:"#475569"}}>{(svc.fees||[]).map((fee,fi)=><div key={fi}>{fee.feeType}: {fee.commercialValue||"—"} {fee.billingCycle}</div>)}</td>
                <td className="px-4 py-3.5 text-xs" style={{color:"#64748b"}}>{fmtShort(f.start_date)} → {fmtShort(f.end_date)}</td>
                <td className="px-4 py-3.5 text-xs" style={{color:"#64748b"}}>{f.sales_rep_name}</td>
                <td className="px-4 py-3.5"><StatusPill status={f.status}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
    )}
  </div>;
};

// ── DASHBOARD ──────────────────────────────────────────────────────────────
const Dashboard=({forms,role,onSelect,onNew})=>{
  const n={total:forms.length,revops:forms.filter(f=>f.status==="submitted").length,finance:forms.filter(f=>f.status==="revops_approved").length,approved:forms.filter(f=>f.status==="approved").length,draft:forms.filter(f=>f.status==="draft").length};
  const totalC=forms.filter(f=>f.status==="approved").reduce((s,f)=>s+Number(f.committed_revenue||0),0);
  const queue=role==="revops"?forms.filter(f=>f.status==="submitted"):role==="finance"?forms.filter(f=>f.status==="revops_approved"):forms.filter(f=>["submitted","draft","revops_rejected"].includes(f.status));
  const stat=(lbl,val,col)=><Card className="p-5"><div className="text-2xl font-black mb-0.5" style={{color:col||NAVY}}>{val}</div><div className="text-xs font-semibold uppercase tracking-wide" style={{color:"#94a3b8"}}>{lbl}</div></Card>;
  return<div>
    <div className="flex items-center justify-between mb-7">
      <h2 className="text-xl font-bold" style={{color:NAVY}}>Dashboard</h2>
      {role==="sales"&&<Btn onClick={onNew}>+ New Order Form</Btn>}
    </div>
    <div className="grid grid-cols-4 gap-4 mb-4">
      {stat("Total OFs",n.total)}
      {stat("Pending RevOps",n.revops,"#d97706")}
      {stat("Pending Finance",n.finance,"#2563eb")}
      {stat("Approved",n.approved,"#16a34a")}
    </div>
    <div className="grid grid-cols-2 gap-4 mb-8">
      <Card className="p-5"><div className="text-xs font-bold uppercase tracking-widest mb-2" style={{color:"#94a3b8"}}>Total committed revenue (approved)</div><div className="text-2xl font-black" style={{color:T}}>₹{totalC.toLocaleString("en-IN")}</div></Card>
      <Card className="p-5"><div className="text-xs font-bold uppercase tracking-widest mb-2" style={{color:"#94a3b8"}}>Drafts in progress</div><div className="text-2xl font-black" style={{color:"#64748b"}}>{n.draft}</div></Card>
    </div>
    <Card>
      <div className="px-6 py-4 border-b" style={{borderColor:"#f1f5f9"}}>
        <h3 className="font-bold text-sm" style={{color:"#475569"}}>{role==="revops"?"⏳ Pending your review":role==="finance"?"💼 Pending your approval":"📋 My active forms"} <span className="ml-2 font-normal" style={{color:"#94a3b8"}}>({queue.length})</span></h3>
      </div>
      {queue.length===0?<div className="py-14 text-center text-sm" style={{color:"#d1d5db"}}>Queue is clear 🎉</div>
      :queue.map(f=>(
        <div key={f.id} onClick={()=>onSelect(f)} className="flex items-center justify-between px-6 py-4 cursor-pointer hover:bg-slate-50 transition-colors" style={{borderBottom:"1px solid #f8fafc"}}>
          <div>
            <div className="font-semibold text-sm" style={{color:NAVY}}>{f.customer_name} <span style={{color:"#d1d5db"}}>·</span> <span className="font-normal" style={{color:"#64748b"}}>{f.brand_name}</span></div>
            <div className="text-xs mt-0.5" style={{color:"#94a3b8"}}>{(f.services_fees||[]).map(s=>s.name).filter(Boolean).join(", ")||"—"} · {f.committed_currency||"INR"} {f.committed_revenue||"—"}</div>
          </div>
          <div className="flex items-center gap-3"><StatusPill status={f.status}/><span style={{color:"#d1d5db"}}>›</span></div>
        </div>
      ))}
    </Card>
  </div>;
};

// ── LOGIN ──────────────────────────────────────────────────────────────────
const Login=({onLogin})=>{
  const [role,setRole]=useState("");
  const [name,setName]=useState("");
  const roles=[{id:"sales",lbl:"Sales",desc:"Submit & track Order Forms",icon:"🤝"},{id:"revops",lbl:"Business / RevOps",desc:"Review & validate submissions",icon:"🔍"},{id:"finance",lbl:"Finance",desc:"Assign OF# & final approval",icon:"💼"}];
  return<div className="min-h-screen flex items-center justify-center" style={{background:`linear-gradient(135deg,${NAVY} 0%,#0d1a2e 100%)`}}>
    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">
      <div className="mb-8">
        <div className="flex items-center gap-3 mb-1">
          <svg width="38" height="38" viewBox="0 0 100 100" fill="none"><path d="M50 8C28 8 12 26 12 48C12 70 33 87 50 96C67 87 88 70 88 48C88 26 72 8 50 8Z" stroke="#1B2B4B" strokeWidth="5.5" fill="none"/><path d="M37 48L50 33L63 48L54.5 57L54.5 72L45.5 72L45.5 57Z" fill="#1B2B4B"/></svg>
          <div className="text-3xl font-black tracking-tight" style={{color:NAVY}}>Fynd</div>
        </div>
        <div className="text-sm mt-1" style={{color:"#94a3b8"}}>Order Form Management Platform</div>
      </div>
      <p className="text-xs font-bold uppercase tracking-widest mb-3" style={{color:"#94a3b8"}}>Select your role</p>
      <div className="space-y-2 mb-6">
        {roles.map(r=><button key={r.id} onClick={()=>setRole(r.id)} className="w-full flex items-center gap-4 p-3.5 rounded-xl border-2 text-left transition-all" style={role===r.id?{borderColor:T,background:"#e0f7f5"}:{borderColor:"#f1f5f9",background:"#f8fafc"}}>
          <span className="text-xl">{r.icon}</span>
          <div><div className="font-bold text-sm" style={{color:role===r.id?NAVY:"#475569"}}>{r.lbl}</div><div className="text-xs" style={{color:"#94a3b8"}}>{r.desc}</div></div>
        </button>)}
      </div>
      <p className="text-xs font-bold uppercase tracking-widest mb-2" style={{color:"#94a3b8"}}>Your name</p>
      <input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&role&&name&&onLogin(role,name)} placeholder="Enter your name" className="w-full border rounded-xl px-4 py-3 text-sm focus:outline-none mb-5" style={{borderColor:"#e2e8f0"}}/>
      <button onClick={()=>role&&name&&onLogin(role,name)} disabled={!role||!name} className="w-full py-3.5 rounded-xl text-white font-bold text-sm disabled:opacity-30 transition-all" style={{background:`linear-gradient(135deg,${T},${NAVY})`}}>Enter platform →</button>
    </div>
  </div>;
};

// ── APP ROOT ───────────────────────────────────────────────────────────────
function App(){
  const [loggedIn,setLoggedIn]=useState(false);
  const [user,setUser]=useState({role:"",name:""});
  const [view,setView]=useState("dashboard");
  const [forms,setForms]=useState([]);
  const [sel,setSel]=useState(null);
  const [newForm,setNewForm]=useState(false);
  const [toast,setToast]=useState(null);
  const [settings,setSettings]=useState({slackWebhook:""});

  useEffect(()=>{
    const saved=lsGet("fynd_of_forms");
    if(saved){try{setForms(JSON.parse(saved));}catch(e){}}
    const cfg=lsGet("fynd_of_settings");
    if(cfg){try{setSettings(JSON.parse(cfg));}catch(e){}}
  },[]);

  const save=useCallback(async fs=>{setForms(fs);lsSet("fynd_of_forms",JSON.stringify(fs));},[]);
  const saveSettings=cfg=>{setSettings(cfg);lsSet("fynd_of_settings",JSON.stringify(cfg));};
  const toast_=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};
  const goTo=v=>{setView(v);setSel(null);setNewForm(false);};

  const handleSubmit=async fd=>{
    const f={...fd,id:uid(),status:"submitted",submitted_at:new Date().toISOString()};
    await save([...forms,f]);
    setNewForm(false);
    toast_("Submitted for RevOps review!");
    // Send Slack notification
    const msg=buildSlackMsg("submitted",f);
    if(msg)sendSlack(settings.slackWebhook,msg);
  };

  const handleDraft=async fd=>{
    const f={...fd,id:uid(),status:"draft",created_at:new Date().toISOString()};
    await save([...forms,f]);setNewForm(false);toast_("Draft saved.");
  };

  const handleAction=async(action,payload)=>{
    const now=new Date().toISOString();let fs=[...forms];const id=sel.id;
    const upd=patch=>{fs=fs.map(f=>f.id===id?{...f,...patch}:f);setSel(prev=>({...prev,...patch}));};
    if(action==="save_edits"){upd(payload.form);toast_("Edits saved!");}
    else if(action==="revops_approve"){
      const patched={...payload.form,status:"revops_approved",revops_reviewed_at:now,revops_comment:payload.comment,revops_reviewer:user.name};
      upd(patched);
      toast_("Sent to Finance!");
      const msg=buildSlackMsg("revops_approved",patched,{comment:payload.comment});
      if(msg)sendSlack(settings.slackWebhook,msg);
    }
    else if(action==="revops_reject"){upd({status:"revops_rejected",revops_reviewed_at:now,revops_comment:payload.comment});toast_("Form rejected.","error");}
    else if(action==="finance_approve"){
      const approved={...sel,...payload.form,status:"approved",of_number:payload.ofNumber,approved_at:now,finance_comment:payload.comment,finance_approver:user.name};
      fs=fs.map(f=>f.id===id?approved:f);setSel(approved);
      toast_(`✓ Approved! OF# ${payload.ofNumber}`);
      const msg=buildSlackMsg("finance_approved",approved,{comment:payload.comment,ofNumber:payload.ofNumber});
      if(msg)sendSlack(settings.slackWebhook,msg);
    }
    else if(action==="finance_reject"){upd({status:"submitted",finance_comment:payload.comment});toast_("Sent back to queue.","error");}
    await save(fs);
  };

  const liveForm=sel?forms.find(f=>f.id===sel.id)||sel:null;
  const rcol={sales:NAVY,revops:"#7c3aed",finance:T}[user.role]||"#64748b";
  const navItems=[{id:"dashboard",lbl:"Dashboard"},{id:"repository",lbl:"Repository"},{id:"settings",lbl:"⚙ Settings"}];

  if(!loggedIn)return<Login onLogin={(r,n)=>{setUser({role:r,name:n});setLoggedIn(true);}}/>;

  return(
    <div className="flex min-h-screen" style={{background:"#f5f7fa",fontFamily:"system-ui,sans-serif"}}>
      <div className="w-52 shrink-0 flex flex-col" style={{background:NAVY}}>
        <div className="p-5 pb-4">
          <div className="flex items-center gap-2">
            <svg width="28" height="28" viewBox="0 0 100 100" fill="none"><path d="M50 8C28 8 12 26 12 48C12 70 33 87 50 96C67 87 88 70 88 48C88 26 72 8 50 8Z" stroke="white" strokeWidth="6" fill="none"/><path d="M37 48L50 33L63 48L54.5 57L54.5 72L45.5 72L45.5 57Z" fill="white"/></svg>
            <div className="text-white font-black text-xl tracking-tight">Fynd</div>
          </div>
          <div className="text-[11px] mt-1" style={{color:"rgba(255,255,255,0.35)"}}>OF Platform</div>
        </div>
        <nav className="flex-1 px-3 py-2 space-y-0.5">
          {navItems.map(it=>(
            <button key={it.id} onClick={()=>goTo(it.id)} className="w-full text-left px-3 py-2.5 rounded-xl text-sm font-semibold transition-all" style={view===it.id&&!newForm?{background:"rgba(255,255,255,0.12)",color:"#fff"}:{color:"rgba(255,255,255,0.45)"}}>
              {it.lbl}
            </button>
          ))}
          {user.role==="sales"&&(
            <button onClick={()=>{setNewForm(true);setView("form");setSel(null);}} className="w-full text-left px-3 py-2.5 rounded-xl text-sm font-semibold transition-all" style={newForm?{background:"rgba(255,255,255,0.12)",color:"#fff"}:{color:"rgba(255,255,255,0.45)"}}>
              + New Order Form
            </button>
          )}
        </nav>
        <div className="p-4 border-t" style={{borderColor:"rgba(255,255,255,0.08)"}}>
          <div className="flex items-center gap-2.5 mb-3">
            <div className="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold text-white shrink-0" style={{background:rcol}}>{user.name?.[0]?.toUpperCase()}</div>
            <div><div className="text-white text-xs font-semibold">{user.name}</div><div className="text-[11px] capitalize" style={{color:"rgba(255,255,255,0.35)"}}>{user.role}</div></div>
          </div>
          <button onClick={()=>{setLoggedIn(false);setUser({role:"",name:""});setView("dashboard");}} className="text-[11px] hover:text-white transition-colors" style={{color:"rgba(255,255,255,0.35)"}}>Sign out</button>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto">
        <div className="max-w-5xl mx-auto p-8">
          {view==="dashboard"&&!newForm&&!liveForm&&<Dashboard forms={forms} role={user.role} onSelect={f=>{setSel(f);setView("detail");}} onNew={()=>{setNewForm(true);setView("form");}}/>}
          {newForm&&view==="form"&&(
            <div>
              <div className="flex items-center gap-3 mb-6">
                <button onClick={()=>{setNewForm(false);setView("dashboard");}} className="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-slate-200 transition-all" style={{color:"#94a3b8"}}>←</button>
                <div><h2 className="text-xl font-bold" style={{color:NAVY}}>New Order Form</h2><p className="text-sm" style={{color:"#94a3b8"}}>Fynd General Template · {getFY(new Date().toISOString())}</p></div>
              </div>
              <SalesForm onSubmit={handleSubmit} onDraft={handleDraft}/>
            </div>
          )}
          {view==="detail"&&liveForm&&<FormDetail key={liveForm.id+liveForm.status} form={liveForm} role={user.role} onAction={handleAction} onBack={()=>{setSel(null);setView("dashboard");}} allForms={forms}/>}
          {view==="repository"&&!liveForm&&<Repository forms={forms} onSelect={f=>{setSel(f);setView("detail");}}/>}
          {view==="settings"&&<SettingsPage settings={settings} onSave={saveSettings}/>}
        </div>
      </div>
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
  </script>
</body>
</html>
